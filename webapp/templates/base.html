<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}INCE News{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .log-line { white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
    .nav-link { transition: color 0.15s; }
    .nav-link.active { color: #2563eb; font-weight: 600; border-bottom: 2px solid #2563eb; padding-bottom: 2px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-6 py-3 flex items-center gap-8">
      <a href="/" class="font-semibold text-gray-800 text-base tracking-tight">INCE News</a>
      <a href="/ai_news"
         class="nav-link text-sm text-gray-500 hover:text-blue-600 {% if active == 'ai' %}active{% endif %}">
        AI News
      </a>
      <a href="/deeptech"
         class="nav-link text-sm text-gray-500 hover:text-blue-600 {% if active == 'deeptech' %}active{% endif %}">
        Deeptech News
      </a>
      <a href="/consumer"
         class="nav-link text-sm text-gray-500 hover:text-blue-600 {% if active == 'consumer' %}active{% endif %}">
        Consumer News
      </a>
      <a href="/crypto"
         class="nav-link text-sm text-gray-500 hover:text-blue-600 {% if active == 'crypto' %}active{% endif %}">
        Crypto News
      </a>
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-3xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
